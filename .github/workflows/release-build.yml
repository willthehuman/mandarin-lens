name: Release installable extension

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-installable-extension
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build and publish latest ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Read extension version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build extension
        run: npm run build

      - name: Package extension
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_FILE="mandarin-lens-v${VERSION}-chrome-extension.zip"
          cd dist
          zip -r "../${ZIP_FILE}" .
          cd ..
          cp "${ZIP_FILE}" mandarin-lens-chrome-extension.zip
          echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"

      - name: Verify extension ZIP
        run: |
          unzip -Z1 "${{ steps.package.outputs.zip_file }}" > zip-contents.txt
          grep -Fxq "manifest.json" zip-contents.txt
          grep -Fxq "background.js" zip-contents.txt
          grep -Fxq "options.html" zip-contents.txt
          grep -Fxq "sidepanel.html" zip-contents.txt
          grep -Eq "^assets/.+" zip-contents.txt

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_FILE="${{ steps.package.outputs.zip_file }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f latest "$GITHUB_SHA"
          git push --force origin refs/tags/latest

          cat > release-notes.md <<'EOF'
          Ready-to-install unpacked Chrome extension build from the latest published commit.

          Download the ZIP asset, unzip it, and load the unzipped folder from `chrome://extensions`.
          EOF
          sed -i "1i Version: ${VERSION}" release-notes.md

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest installable build (v${VERSION})" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create latest \
              --title "Latest installable build (v${VERSION})" \
              --notes-file release-notes.md \
              --latest
          fi

          gh release upload latest "${ZIP_FILE}" mandarin-lens-chrome-extension.zip --clobber

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_FILE="${{ steps.package.outputs.zip_file }}"
          TAG="${GITHUB_REF_NAME}"

          if [ "${TAG}" != "v${VERSION}" ]; then
            echo "Tag ${TAG} does not match package version v${VERSION}."
            exit 1
          fi

          cat > release-notes-versioned.md <<EOF
          Mandarin Lens v${VERSION}

          Download the ZIP asset, unzip it, and load the unzipped folder from \`chrome://extensions\`.
          EOF

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "Mandarin Lens v${VERSION}" \
              --notes-file release-notes-versioned.md
          else
            gh release create "${TAG}" \
              --title "Mandarin Lens v${VERSION}" \
              --notes-file release-notes-versioned.md
          fi

          gh release upload "${TAG}" "${ZIP_FILE}" mandarin-lens-chrome-extension.zip --clobber
